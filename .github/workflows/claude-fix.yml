name: Claude Auto-Fix Customer Issues

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  claude-fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Claude Code Action Official
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Check the GitHub repository Ranger9845/sweet-street-co-llc for open issues labeled "customer-feedback" that do NOT have a "claude-processed" label.

            For each unprocessed issue:
            1. If the issue body contains a customer email (**Email:** field), immediately POST to https://sweet-street-co-llc.onrender.com/api/feedback-ack with { "email": "<email>", "name": "<name>" } to let them know we're looking into it.
            2. Read the issue to determine if it's a specific, reproducible bug in the code.
            3. If yes, find the relevant file(s), apply a minimal fix, and open a pull request.
            4. If the feedback is vague or not a code bug, add a comment on the issue explaining no code change is needed.
            5. Add the label "claude-processed" to the issue so it isn't re-processed next run.

            The app is:
            - React + Vite frontend (src/) deployed on Vercel
            - Express API (api/ + server.ts) deployed on Render at sweet-street-co-llc.onrender.com
            - Supabase database
            - Clerk for customer auth

            Focus on api/ and src/ directories. Do not touch package.json, vercel.json, or deployment config unless the bug is clearly there.
