name: Claude Auto-Fix Scheduled Retry

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours
  workflow_dispatch:

jobs:
  retry-pending-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Re-queue issues deferred from failed runs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh label create "retry-pending" --color "FFA500" --description "Queued for scheduled retry" --repo ${{ github.repository }} --force
          gh label create "customer-feedback" --color "0075ca" --description "Submitted via customer feedback form" --repo ${{ github.repository }} --force

          issues=$(gh issue list \
            --repo ${{ github.repository }} \
            --label "retry-pending" \
            --state open \
            --json number \
            --jq '.[].number')

          if [ -z "$issues" ]; then
            echo "No pending issues to retry."
            exit 0
          fi

          for number in $issues; do
            echo "Re-queuing issue #$number"
            gh issue edit "$number" \
              --remove-label "retry-pending" \
              --repo ${{ github.repository }}
            sleep 2
            gh issue edit "$number" \
              --add-label "customer-feedback" \
              --repo ${{ github.repository }}
            # Space out re-triggers so the API isn't hammered
            sleep 10
          done
